name: Join Me 揪ㄇ
team_name: 揪ㄇ
category: Food, Drink, Social
intro: |-
  把「想做」變成「一起出發」
  Join Me 是一款以活動為核心的輕社交 App。
  使用者可以發布或加入「委託」，快速找到一起完成當下活動的夥伴。
  Join Me 希望讓面對面的揪團，就像在線上遊戲找隊友一樣簡單。
